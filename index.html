<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CréditoApp — Gestión de Préstamos</title>
<style>
  /* Mantenemos tus estilos originales (los he resumido para que el mensaje no sea infinito) */
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f5f0; --surface: #ffffff; --border: #e2ddd4; --text: #1a1814;
    --accent: #c8562a; --font: 'DM Sans', sans-serif; --mono: 'DM Mono', monospace;
  }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
  
  /* Estilos del Login */
  #login-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:9999; display:flex; align-items:center; justify-content:center; }
  .login-card { background:white; padding:40px; border-radius:16px; border:1px solid var(--border); text-align:center; width:90%; max-width:400px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
  .login-input { width:100%; padding:12px; margin:15px 0; border:1px solid var(--border); border-radius:8px; text-align:center; font-size:16px; outline:none; }
  .login-btn { width:100%; padding:12px; background:var(--accent); color:white; border:none; border-radius:8px; font-weight:600; cursor:pointer; }
  
  /* Resto de estilos que ya tenías */
  nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 1.5rem; display: flex; align-items: center; gap: 2rem; height: 56px; position: sticky; top: 0; z-index: 100; }
  .nav-brand { font-size: 15px; font-weight: 600; color: var(--accent); display: flex; align-items: center; gap: 8px; }
  .nav-tabs { display: flex; flex: 1; }
  .nav-tab { background: none; border: none; padding: 0 14px; height: 56px; font-size: 13px; font-weight: 500; color: #6b6560; cursor: pointer; border-bottom: 2px solid transparent; }
  .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .page { display: none; padding: 1.5rem; max-width: 1100px; margin: 0 auto; width: 100%; }
  .page.active { display: block; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.25rem; margin-bottom: 1rem; }
  .btn { padding: 8px 16px; border-radius: 8px; cursor: pointer; border: 1px solid var(--border); font-size: 13px; }
  .btn-primary { background: var(--accent); color: white; border: none; }
  input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid var(--border); border-radius: 8px; }
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="login-overlay">
  <div class="login-card">
    <h2 style="color:var(--accent)">CréditoApp</h2>
    <p style="font-size:14px; color:#6b6560;">Acceso Administrativo</p>
    <input type="password" id="pass-input" class="login-input" placeholder="Ingresa la contraseña">
    <button onclick="verificarAcceso()" class="login-btn">Entrar al Sistema</button>
  </div>
</div>

<div id="app-content" style="display:none;">
  <nav>
    <div class="nav-brand"><span>CréditoApp</span></div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showPage('dashboard')">Dashboard</button>
      <button class="nav-tab" onclick="showPage('clientes')">Clientes</button>
      <button class="nav-tab" onclick="showPage('prestamos')">Préstamos</button>
    </div>
  </nav>

  <div id="page-dashboard" class="page active">
    <h1>Resumen</h1>
    <div id="stats-container"></div>
  </div>

  <div id="page-clientes" class="page">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h1>Clientes</h1>
        <button class="btn btn-primary" onclick="mostrarFormCliente()">+ Nuevo Cliente</button>
    </div>
    <div class="card" id="form-cliente" style="display:none; margin-top:20px;">
        <input type="text" id="c-nombre" placeholder="Nombre completo">
        <input type="text" id="c-cedula" placeholder="Cédula">
        <input type="text" id="c-tel" placeholder="Teléfono">
        <button class="btn btn-primary" style="margin-top:10px" onclick="guardarClienteNube()">Guardar en la Nube</button>
    </div>
    <div id="lista-clientes" style="margin-top:20px;"></div>
  </div>

  <div id="page-prestamos" class="page">
    <h1>Préstamos</h1>
    <p>Aquí aparecerán los préstamos vinculados.</p>
  </div>
</div>

<script>
  // 1. CONEXIÓN A TU SUPABASE
  const _supabase = supabase.createClient(
    'https://cuigctbwhfjeypfvrbvi.supabase.co', 
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN1aWdjdGJ3aGZqZXlwZnZyYnZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0Mjg4OTYsImV4cCI6MjA5MzAwNDg5Nn0.I4P6LufK2BhH6oWao2cW4wjDR1MNs5MVwwIFT0OBmdQ'
  );

  // 2. VERIFICAR ACCESO
  function verificarAcceso() {
    const pass = document.getElementById('pass-input').value;
    if (pass === "Gabriella2026*") {
      document.getElementById('login-overlay').style.display = 'none';
      document.getElementById('app-content').style.display = 'block';
      cargarClientes();
    } else {
      alert("Contraseña incorrecta");
    }
  }

  // 3. NAVEGACIÓN
  function showPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + pageId).classList.add('active');
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    event.currentTarget.classList.add('active');
  }

  function mostrarFormCliente() {
    const f = document.getElementById('form-cliente');
    f.style.display = f.style.display === 'none' ? 'block' : 'none';
  }

  // 4. LÓGICA DE DATOS (NUBE)
  async function guardarClienteNube() {
    const nombre = document.getElementById('c-nombre').value;
    const cedula = document.getElementById('c-cedula').value;
    const telefono = document.getElementById('c-tel').value;

    if(!nombre) return alert("El nombre es obligatorio");

    const { data, error } = await _supabase
      .from('clientes')
      .insert([{ nombre, cedula, telefono }]);

    if (error) {
      alert("Error al guardar: " + error.message);
    } else {
      alert("¡Cliente guardado en la nube!");
      document.getElementById('c-nombre').value = "";
      mostrarFormCliente();
      cargarClientes();
    }
  }

  async function cargarClientes() {
    const container = document.getElementById('lista-clientes');
    container.innerHTML = "Cargando...";

    let { data: clientes, error } = await _supabase
      .from('clientes')
      .select('*');

    if (error) {
        container.innerHTML = "Error al cargar datos.";
    } else {
        container.innerHTML = "";
        clientes.forEach(c => {
            container.innerHTML += `
              <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <strong>${c.nombre}</strong><br>
                    <small>CC: ${c.cedula || 'N/A'} | Tel: ${c.telefono || 'N/A'}</small>
                </div>
                <button class="btn" style="color:red" onclick="eliminarCliente(${c.id})">Borrar</button>
              </div>`;
        });
    }
  }

  async function eliminarCliente(id) {
    if(confirm("¿Seguro que quieres borrar este cliente?")) {
        await _supabase.from('clientes').delete().eq('id', id);
        cargarClientes();
    }
  }
</script>
</body>
</html>
